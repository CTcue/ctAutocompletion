<!DOCTYPE html>
<html ng-app="CTcue:ctAutocompletion">
<head>
  <title>CTcue | ctAutocompletion demo</title>

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=8; IE=11" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ctAutocompletion finds relevant UMLS search terms and synonyms.">

  <link href="./assets/favicon.ico" rel="shortcut icon">
  <link href="./assets/css/ctcue-1.3.1.min.css" rel="stylesheet">
  <script src="./assets/js/frameworks-1.3.1.min.js"></script>

  <script src="js/demo-1.3.1.js"></script>
</head>
<body ng-controller="ctAutocompletionDemo" ng-strict-di>
    <div ui-view>
        <div class="container">
            <h2 class="logo">
                ctAutocompletion <small>manage concepts</small>

                <i class="icon-ct-logo"></i>
            </h2>

            <div class="block content manage-concepts">
                <div class="full">
                    <input-field obj="obj"></input-field>
                </div>

                <div class="block">
                    <table class="table">
                        <tr>
                            <th>CUI (id)</th>
                            <th>Language</th>
                            <th>Sources</th>
                            <th>Types</th>
                            <th>Preferred term</th>
                            <th>Synonyms</th>

                            <th class="actions">
                                <button class="right add-button" ng-click="showAddTerm();">
                                    Add term
                                </button>
                            </th>
                        <tr>

                        <tr ng-repeat="row in rows track by $index">
                            <td>{{ row.cui }}</td>
                            <td>{{ row.lang }}</td>
                            <td>{{ row.sources }}</td>
                            <td>{{ row.types }}</td>
                            <td>{{ row.pref }}</td>
                            <td>
                                <code style="font-size: 13px;">
                                    {{ row.synonyms }}
                                </code>
                            </td>

                            <td class="actions">
                                <button class="left small" ng-click="editRow($event, $index);">
                                    <i class="icon-edit"></i>
                                </button>

                                <button class="right small" ng-click="deleteRow($event, $index);">
                                    <i class="icon-delete"></i>
                                </button>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="concept-modal" ng-if="addNewTerm || editTerm">
                <div class="modal-inner">
                    <div class="full concept-form">
                        <h3>{{ addNewTerm ? 'Add new' : 'Edit' }} concept</h3>

                        <div class="full add-top">
                            <div class="small left">
                                <label>CUI</label>
                                <input type="text" ng-model="Term.cui">
                            </div>

                            <div class="tiny left">
                                <label>Language</label>
                                <input type="text" ng-model="Term.lang">
                            </div>

                            <div class="small left">
                                <label>Sources</label>
                                <input type="text" ng-model="Term.sources">
                            </div>

                            <div class="small left">
                                <label>Types</label>
                                <input type="text" ng-model="Term.types">
                            </div>
                        </div>

                        <div class="full add-top">
                            <label>Preferred</label>
                            <input type="text" ng-model="Term.pref">
                        </div>

                        <div class="full add-top">
                            <label>Synonyms</label>

                            <textarea
                                ng-model="Term.synonyms"
                                ng-list="&#10;"
                                ng-trim="false"
                                rows="4"
                                resizer></textarea>
                        </div>

                        <div class="full form-buttons">
                            <button ng-click="closeModal();" class="cancel-button">Cancel</button>

                            <button ng-click="updateTerm(Term); closeModal();" ng-if="editTerm">Update</button>

                            <button ng-click="addTerm(Term); closeModal();" ng-if="addNewTerm">Add term</button>
                        </div>
                    </div>
                </div>
            </div>


            <div class="block footer">
                <menu></menu>
            </div>
        </div>
    </div>
</body>
</html>
